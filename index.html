<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日 AI/ML — AI & ML Daily</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"SF Pro Display","Noto Sans SC","Segoe UI",Roboto,sans-serif;background:#0a0e1a;color:#e4e6eb;line-height:1.7}
.container{max-width:760px;margin:0 auto;padding:24px 20px 60px}
header{text-align:center;padding:56px 0 40px}
header h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#00d4ff 0%,#7b61ff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:1px}
header p{margin-top:8px;font-size:1rem;color:#8b92a8}
header .subtitle{font-size:0.9rem;color:#7b61ff;margin-top:4px;font-family:"SF Mono",Menlo,monospace}
.list{margin-top:32px}
.entry{display:flex;align-items:baseline;gap:16px;padding:18px 20px;background:#141a2e;border-radius:10px;box-shadow:0 1px 8px rgba(0,212,255,0.08);margin-bottom:14px;transition:transform 0.15s,box-shadow 0.15s,border-color 0.15s;text-decoration:none;color:inherit;border-left:3px solid #00d4ff}
.entry:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,212,255,0.2);border-left-color:#7b61ff}
.entry .day{flex-shrink:0;font-size:0.85rem;color:#00d4ff;font-weight:700;min-width:50px;font-family:"SF Mono",Menlo,monospace}
.entry .title{font-size:1.05rem;font-weight:600;color:#e4e6eb}
.entry .topics{font-size:0.85rem;color:#8b92a8;margin-left:auto;text-align:right}
footer{text-align:center;padding:40px 0 12px;font-size:0.82rem;color:#5a6378}
@media(max-width:600px){
  header h1{font-size:1.5rem}
  .entry{flex-direction:column;gap:4px}
  .entry .topics{margin-left:0;text-align:left}
}
</style>
</head>
<body>
<div class="container">
<header>
  <h1>每日 AI / ML</h1>
  <p>AI &amp; ML Daily — BigCat's Learning Path</p>
  <div class="subtitle">&gt; AI · Agents · Machine Learning · 每日四则</div>
</header>
<div class="list">
  <!-- entries will be added here -->
</div>
<footer>BigCat · AI &amp; ML Daily · 2026</footer>
</div>
</body>
</html>
